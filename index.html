<!DOCTYPE html>
<html>
<head>
<title>Security Scan</title>

<style>
body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#terminal{
padding:20px;
font-size:18px;
}

#progressBox{
width:80%;
margin:20px auto;
border:2px solid #00ff00;
height:25px;
}

#progressBar{
height:100%;
width:0%;
background:#00ff00;
}

#centerMessage{
text-align:center;
font-size:28px;
margin-top:40px;
display:none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="terminal"></div>

<div id="progressBox">
<div id="progressBar"></div>
</div>

<div id="centerMessage">
⚠ CYBER SECURITY WARNING ⚠<br><br>
Lo BSDK 😅<br>
Random links open madi login madbedi!<br><br>
Always verify links before entering passwords.
</div>

<script>

/* MATRIX BACKGROUND */

let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
letters = letters.split("");

let fontSize = 16;
let columns = canvas.width/fontSize;
let drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);


/* TERMINAL TEXT */

let terminal = document.getElementById("terminal");

let lines = [
"Initializing security scan...",
"Connecting to network...",
"Analyzing device...",
"Checking suspicious links...",
"IP detected: 192.168."+Math.floor(Math.random()*200)+"."+Math.floor(Math.random()*200),
"Scanning browser activity...",
"Potential security risk detected..."
];

let lineIndex=0;

function typeLine(){
if(lineIndex < lines.length){
terminal.innerHTML += "> " + lines[lineIndex] + "<br>";
lineIndex++;
setTimeout(typeLine,1000);
}
}

typeLine();


/* PROGRESS BAR */

let progress=0;
let bar=document.getElementById("progressBar");

let interval=setInterval(function(){
progress+=2;
bar.style.width=progress+"%";

if(progress>=100){
clearInterval(interval);
document.getElementById("centerMessage").style.display="block";
}
},120);

</script>

</body>
</html>
