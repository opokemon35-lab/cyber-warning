<!DOCTYPE html>
<html>
<head>
<title>Cyber Security Scan</title>

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

#grid{
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,0,0.1) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,0,0.1) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

#terminal{
padding:20px;
font-size:17px;
max-height:60vh;
overflow:auto;
}

#command{
background:black;
color:#00ff00;
border:none;
font-family:monospace;
font-size:17px;
outline:none;
}

#globe{
position:fixed;
right:20px;
top:20px;
font-size:80px;
animation:spin 6s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

#packets{
position:fixed;
right:20px;
top:120px;
font-size:16px;
}

#progressBox{
width:80%;
margin:20px auto;
border:2px solid #00ff00;
height:25px;
}

#progressBar{
height:100%;
width:0%;
background:#00ff00;
}

#warning{
display:none;
text-align:center;
font-size:32px;
color:red;
margin-top:20px;
}

#lesson{
display:none;
text-align:center;
font-size:24px;
color:white;
margin-top:20px;
}

#skull{
display:none;
text-align:center;
font-size:90px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.flash{
animation:flash 0.3s 6;
}

@keyframes flash{
0%{background:black}
50%{background:red}
100%{background:black}
}

</style>
</head>

<body>

<div id="grid"></div>

<canvas id="matrix"></canvas>

<div id="globe">🌍</div>

<div id="packets">
Packets: <span id="packetCount">0</span>
</div>

<div id="terminal"></div>

<div style="padding:20px">
> <input id="command" placeholder="type command...">
</div>

<div id="progressBox">
<div id="progressBar"></div>
</div>

<div id="skull">☠</div>

<div id="warning">⚠ SECURITY BREACH DETECTED ⚠</div>

<div id="lesson">
😅 Relax!<br><br>
This was a cybersecurity awareness demo.<br>
Never open unknown links.
</div>

<script>

/* MATRIX RAIN */

let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
letters=letters.split("");

let fontSize=16;
let columns=canvas.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


/* TERMINAL */

let terminal=document.getElementById("terminal");

function log(text){
terminal.innerHTML+="<br>> "+text;
terminal.scrollTop=terminal.scrollHeight;
}

let boot=[

"Initializing cyber scan...",
"Connecting to node...",
"Detecting IP...",
"IP: 192.168."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255),
"Scanning network ports...",
"Accessing system modules...",
"Injecting scanner...",
"Starting password brute force..."

];

let i=0;

function bootSeq(){

if(i<boot.length){

log(boot[i]);
i++;

setTimeout(bootSeq,900);

}

}

bootSeq();


/* PASSWORD CRACK */

let crack=0;

function crackPass(){

if(crack<100){

log("Cracking password "+crack+"%");
crack+=10;

setTimeout(crackPass,600);

}

}

setTimeout(crackPass,6000);


/* NETWORK PACKETS */

let packets=0;

setInterval(function(){

packets+=Math.floor(Math.random()*50);

document.getElementById("packetCount").innerText=packets;

},800);


/* COMMAND TERMINAL */

let cmd=document.getElementById("command");

cmd.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let c=cmd.value;

log(c);

if(c==="help"){
log("commands: scan, ip, clear")
}

else if(c==="scan"){
log("Scanning device...")
}

else if(c==="ip"){
log("IP: 192.168."+Math.floor(Math.random()*200))
}

else if(c==="clear"){
terminal.innerHTML=""
}

else{
log("command not found")
}

cmd.value="";

}

});


/* PROGRESS BAR */

let progress=0;
let bar=document.getElementById("progressBar");

let interval=setInterval(function(){

progress+=2;

bar.style.width=progress+"%";

if(progress>=100){

clearInterval(interval);

document.body.classList.add("flash");

document.getElementById("skull").style.display="block";
document.getElementById("warning").style.display="block";

setTimeout(function(){
document.getElementById("lesson").style.display="block";
},4000);

}

},120);

</script>

</body>
</html>
