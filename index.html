<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial;
        color: white;
        text-align: center;
    }

    #fakeScreen {
        margin-top: 100px;
        font-size: 24px;
    }

    #scare {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        z-index: 9999;
    }

    #scare img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>
</head>
<body>

<div id="fakeScreen">
    <h1> Loading... Please wait</h1>
    <p>Do not close this page</p>
</div>

<div id="scare">
    <img src="01wattana.jpg">
</div>

<audio id="scream" src="https://www.soundjay.com/human/sounds/scream-01.mp3"></audio>

<script>
setTimeout(() => {
    document.getElementById("fakeScreen").style.display = "none";

    let scare = document.getElementById("scare");
    scare.style.display = "block";

    document.getElementById("scream").play();

    let flashes = 0;
    let flashInterval = setInterval(() => {
        document.body.style.backgroundColor =
            (document.body.style.backgroundColor === "black") ? "white" : "black";
        flashes++;
        if (flashes > 10) clearInterval(flashInterval);
    }, 100);

    setTimeout(() => {
        alert(" HOGO MUDEVI ");
    }, 1500);

}, 3000);
</script>

</body>
</html>
