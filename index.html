<!DOCTYPE html>
<html>
<head>
<title>System Security Scan</title>

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#terminal{
padding:20px;
font-size:18px;
}

#progressBox{
width:80%;
margin:20px auto;
border:2px solid #00ff00;
height:25px;
}

#progressBar{
height:100%;
width:0%;
background:#00ff00;
}

#warning{
display:none;
text-align:center;
font-size:32px;
color:red;
margin-top:20px;
animation:glitch 0.4s infinite;
}

#lesson{
display:none;
text-align:center;
font-size:24px;
margin-top:20px;
color:white;
}

@keyframes glitch{
0%{transform:translate(1px,1px)}
25%{transform:translate(-1px,2px)}
50%{transform:translate(-3px,1px)}
75%{transform:translate(3px,-1px)}
100%{transform:translate(1px,-2px)}
}

.flash{
animation:flash 0.3s 6;
}

@keyframes flash{
0%{background:black;}
50%{background:red;}
100%{background:black;}
}

.shake{
animation:shake 0.3s;
animation-iteration-count:4;
}

@keyframes shake{
0%{transform:translate(2px,2px)}
25%{transform:translate(-2px,2px)}
50%{transform:translate(-2px,-2px)}
75%{transform:translate(2px,-2px)}
100%{transform:translate(2px,2px)}
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="terminal"></div>

<div id="progressBox">
<div id="progressBar"></div>
</div>

<div id="warning">
⚠ SECURITY BREACH DETECTED ⚠
</div>

<div id="lesson">
😅 Relax!<br><br>
This was only a cybersecurity awareness demo.<br>
Never open random links or login pages.
</div>

<audio id="alarm">
<source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>

/* FULLSCREEN ON TAP */

function goFullscreen(){
if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen();
}
}
document.body.addEventListener("click",goFullscreen);


/* MATRIX BACKGROUND */

let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
letters=letters.split("");

let fontSize=16;
let columns=canvas.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


/* TERMINAL SCAN */

let terminal=document.getElementById("terminal");

let battery=Math.floor(Math.random()*100);

let lines=[

"root@system:~$ initializing security scan...",
"root@system:~$ connecting to remote node...",
"root@system:~$ detecting IP address...",
"IP detected: 192.168."+Math.floor(Math.random()*200)+"."+Math.floor(Math.random()*200),
"root@system:~$ scanning network ports...",
"root@system:~$ bypassing firewall...",
"root@system:~$ checking suspicious links...",
"Battery level detected: "+battery+"%",
"root@system:~$ accessing camera module...",
"root@system:~$ scanning contacts database...",
"Contacts detected: "+Math.floor(Math.random()*300),
"root@system:~$ extracting data packets...",
"root@system:~$ analyzing browser activity...",
"root@system:~$ tracking device location...",
"Location detected: Bengaluru, India",
"root@system:~$ injecting payload...",
"root@system:~$ system vulnerability found..."

];

let i=0;

function typeLine(){

if(i<lines.length){

terminal.innerHTML+="> "+lines[i]+"<br>";

i++;

setTimeout(typeLine,900);

}

}

typeLine();


/* COUNTDOWN */

let count=5;

function countdown(){

if(count>0){

terminal.innerHTML+="> initiating breach in "+count+"...<br>";

count--;

setTimeout(countdown,1000);

}

}

setTimeout(countdown,5000);


/* PROGRESS BAR */

let progress=0;
let bar=document.getElementById("progressBar");

let interval=setInterval(function(){

progress+=2;

bar.style.width=progress+"%";

if(progress>=100){

clearInterval(interval);

document.body.classList.add("flash");
document.body.classList.add("shake");

document.getElementById("warning").style.display="block";

document.getElementById("alarm").play();

if(navigator.vibrate){
navigator.vibrate([300,200,300,200,500]);
}

setTimeout(function(){

document.getElementById("lesson").style.display="block";

},4000);

}

},120);

</script>

</body>
</html>
